<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM3 Geospatial Viewer</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        #map { height: 75vh; width: 100%; margin-top: 15px; border-radius: 8px; border: 2px solid #ccc; }
        .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input[type="text"] { padding: 8px; width: 300px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        #status-bar { padding: 10px; background: #e9ecef; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Geospatial Segmentation Viewer</h2>

    <div class="controls">
        <input type="text" id="imageIdInput" placeholder="Paste image_id from endpoint here...">
        <button onclick="loadMap()">Load Map</button>
    </div>

    <div id="status-bar">System Ready. Paste an Image ID to begin.</div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        let map;
        let drawnItems;
        let currentTiffLayer = null;
        let currentImageId = null;
        
        // NEW: Variables for toggling vector masks
        let maskLayers = {};  
        let layerControl = null; 

        function showStatus(msg) {
            document.getElementById('status-bar').innerText = msg;
        }

        // Initialize Map
        function initMap() {
            map = L.map('map').setView([23.0225, 72.5714], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);

            drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);

            const drawControl = new L.Control.Draw({
                edit: { featureGroup: drawnItems },
                draw: {
                    polygon: true,
                    rectangle: true,
                    circle: false,
                    polyline: false,
                    marker: false,
                    circlemarker: false
                }
            });
            map.addControl(drawControl);

            map.on(L.Draw.Event.CREATED, function (event) {
                drawnItems.clearLayers(); 
                const layer = event.layer;
                drawnItems.addLayer(layer);
                triggerSegmentation(layer.toGeoJSON());
            });
        }

        // Fetch TIFF and render via GeoRaster
        async function loadMap() {
            const id = document.getElementById('imageIdInput').value;
            if (!id) return alert("Please enter an image_id!");
            
            currentImageId = id;

            try {
                showStatus("Downloading and parsing TIFF...");
                const response = await fetch(`http://127.0.0.1:5000/api/v1/images/${currentImageId}/visualization`);
                const data = await response.json();
                
                if (data.error) return alert("Error: " + data.error);

                const tiffResponse = await fetch(data.file_url);
                const arrayBuffer = await tiffResponse.arrayBuffer();
                const georaster = await parseGeoraster(arrayBuffer);

                if (currentTiffLayer) map.removeLayer(currentTiffLayer);
                
                currentTiffLayer = new GeoRasterLayer({
                    georaster: georaster,
                    opacity: 0.8,
                    resolution: 256
                });

                currentTiffLayer.addTo(map);
                map.fitBounds(currentTiffLayer.getBounds());
                
                showStatus("TIFF Loaded! Draw an AOI polygon to run segmentation.");

            } catch (error) {
                console.error(error);
                showStatus("Failed to load map visualization.");
            }
        }

        // Trigger API Segmentation
        async function triggerSegmentation(aoiGeoJSON) {
            if (!currentImageId) return alert("Please load an image first.");

            showStatus("Submitting AOI to background SAM3 process...");
            
            try {
                const response = await fetch(`http://127.0.0.1:5000/api/v1/images/${currentImageId}/segment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ aoi: aoiGeoJSON })
                });

                const data = await response.json();
                if (data.error) return alert("Error: " + data.error);

                showStatus("Segmentation started. Task ID: " + data.task_id);
                pollStatus(data.task_id);
            } catch (error) {
                console.error(error);
                showStatus("Failed to trigger segmentation.");
            }
        }

        // Poll for background status
        async function pollStatus(taskId) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`http://127.0.0.1:5000/api/v1/tasks/${taskId}/status`);
                    const data = await response.json();

                    if (data.status === 'failed') {
                        clearInterval(interval);
                        showStatus("Processing failed: " + data.message);
                    } else if (data.status === 'finished') {
                        clearInterval(interval);
                        showStatus("Segmentation complete! Rendering vector masks...");
                        renderMasks(data.result.masks);
                    } else {
                        showStatus("Processing... " + data.message);
                    }
                } catch (error) {
                    console.error("Polling error:", error);
                }
            }, 3000); 
        }

        // Render GeoJSON vectors & create layer controls
        async function renderMasks(masksObj) {
            if (layerControl) {
                map.removeControl(layerControl);
            }

            Object.values(maskLayers).forEach(layer => map.removeLayer(layer));
            maskLayers = {}; 

            const colorMap = {
                "building": "#ff0000",
                "road": "#0000ff",
                "vegetation": "#00ff00"
            };

            for (const [prompt, url] of Object.entries(masksObj)) {
                try {
                    const hexColor = colorMap[prompt] || "#ffffff";
                    
                    const response = await fetch(url);
                    const geojsonData = await response.json();

                    const layer = L.geoJSON(geojsonData, {
                        style: function (feature) {
                            return {
                                color: hexColor,
                                weight: 2,
                                fillColor: hexColor,
                                fillOpacity: 0.4
                            };
                        }
                    });

                    layer.addTo(map);

                    const layerLabel = prompt.charAt(0).toUpperCase() + prompt.slice(1);
                    maskLayers[layerLabel] = layer;
                    
                } catch (error) {
                    console.error(`Failed to load ${prompt} vector mask:`, error);
                }
            }

            if (Object.keys(maskLayers).length > 0) {
                layerControl = L.control.layers(null, maskLayers, {
                    collapsed: false 
                }).addTo(map);
                showStatus("Vector masks rendered! Use the control box in the top right to toggle layers.");
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
